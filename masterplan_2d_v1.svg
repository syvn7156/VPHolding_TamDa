    <circle cx="935" cy="120" r="5"/><circle cx="935" cy="160" r="5"/><circle cx="935" cy="350" r="5"/><circle cx="935" cy="400" r="5"/><circle cx="935" cy="450" r="5"/>
    <circle cx="320" cy="100" r="4"/><circle cx="350" cy="105" r="4"/><circle cx="650" cy="100" r="4"/><circle cx="680" cy="105" r="4"/>

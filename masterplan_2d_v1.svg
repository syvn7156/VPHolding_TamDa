    <g>
      <rect x="745" y="430" width="55" height="55" fill="#e67e22" stroke="#a0501a" stroke-width="1.5" rx="2"/>
      <text x="772" y="463">T3</text>
      <text x="772" y="500" font-size="8" font-weight="600" fill="#333">35 tầng</text>

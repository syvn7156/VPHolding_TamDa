    <rect x="120" y="-8" width="14" height="10" fill="#e67e22"/><text x="138" y="0">Tower hướng biển (35F)</text>
    <rect x="280" y="-8" width="14" height="10" fill="#d35400"/><text x="298" y="0">Tower phía sau (28F)</text>
    <rect x="430" y="-8" width="14" height="10" fill="#9b59b6"/><text x="448" y="0">Clubhouse</text>
    <rect x="530" y="-8" width="14" height="10" fill="#e74c3c"/><text x="548" y="0">Retail/F&amp;B</text>
    <rect x="630" y="-8" width="14" height="10" fill="#16a085"/><text x="648" y="0">Wellness</text>
    <rect x="720" y="-8" width="14" height="10" fill="#3498db"/><text x="738" y="0">Hồ bơi/Marina</text>
    <rect x="830" y="-8" width="14" height="10" fill="url(#grass)"/><text x="848" y="0">Cây xanh</text>

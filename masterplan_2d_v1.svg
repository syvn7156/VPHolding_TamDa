    <polygon points="0,18 5,0 0,4 -5,0" fill="#333"/>
    <text y="-26" text-anchor="middle" font-size="11" font-weight="700">N</text>
  </g>

  <g transform="translate(20,20)">
    <text font-size="18" font-weight="800" fill="#1a3a5c">VP HOLDING — RESORT 300 ha (Concept v1)</text>
    <text y="20" font-size="11" fill="#555">Mặt bằng tổng thể (Master Site Plan) · 8 chung cư + bến thuyền + tiện ích · Tỷ lệ phác thảo</text>
  </g>

  <rect x="40" y="70" width="920" height="600" fill="url(#grass)" stroke="#2c3e50" stroke-width="2.5" stroke-dasharray="8 4"/>
  <text x="50" y="90" font-size="10" font-weight="600" fill="#2c3e50">Ranh đất (Site Boundary): ~300 ha · ~1.7 × 1.7 km</text>

  <rect x="40" y="560" width="920" height="110" fill="url(#water)"/>
  <text x="500" y="660" text-anchor="middle" font-size="14" font-weight="700" fill="#1a5a7a" opacity="0.7">BIỂN / HỒ (Sea / Lake)</text>

  <rect x="60" y="540" width="880" height="22" fill="url(#sand)"/>
  <text x="500" y="556" text-anchor="middle" font-size="9" font-weight="600" fill="#7a6020">Bãi tắm + Đường dạo bộ (Beach + Promenade) · ~3.5 ha</text>


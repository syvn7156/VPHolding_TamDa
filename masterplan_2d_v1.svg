<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" style="font-family:'Inter',sans-serif">
  <title>Mặt bằng tổng thể concept — Resort 300ha với 8 chung cư + bến thuyền</title>
  <desc>Phác thảo top-down: 8 tháp chung cư bố trí cong hướng biển ở phía nam, marina + bãi tắm ven bờ, hồ bơi và clubhouse trung tâm, công viên cây xanh hai bên, lối vào chính phía bắc.</desc>

  <defs>
    <pattern id="water" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#cfe8f3"/>
      <path d="M0 10 Q5 6 10 10 T20 10" stroke="#9ec8db" fill="none" stroke-width="0.8"/>
    </pattern>
    <pattern id="grass" patternUnits="userSpaceOnUse" width="14" height="14">
      <rect width="14" height="14" fill="#dbeac0"/>
      <circle cx="3" cy="3" r="0.8" fill="#a8c47a"/>
      <circle cx="9" cy="8" r="0.8" fill="#a8c47a"/>
      <circle cx="6" cy="11" r="0.8" fill="#a8c47a"/>
    </pattern>
    <pattern id="sand" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#f4e8c8"/>
      <circle cx="3" cy="3" r="0.4" fill="#d4be88"/>
      <circle cx="7" cy="6" r="0.4" fill="#d4be88"/>
    </pattern>
  </defs>

  <g transform="translate(940,40)">
    <circle r="22" fill="#fff" stroke="#333" stroke-width="1"/>

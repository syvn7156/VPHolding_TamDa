    <rect x="100" y="180" width="180" height="70" fill="#27ae60" stroke="#145a32" stroke-width="1.5" rx="3"/>
    <text x="190" y="210" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">SPORTS ZONE</text>
